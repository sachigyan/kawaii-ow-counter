<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAWAII OW COUNTER 自動カウント版</title>
<style>
:root {
  --owc-role-color: #b967ff;
  --owc-win-color: #3ad2ee;
  --owc-loss-color: #f54ca7;
  --owc-draw-color: #a7adb7;
  --owc-outline-color: #ffffff;
  --owc-separator: "💛";
  --owc-separator-color: #ffd84d;
  --owc-bubble-win-bg: #ffe845;
  --owc-bubble-loss-bg: #f54ca7;
  --owc-role-size: 30px;
  --owc-num-size: 58px;
  --owc-suffix-size: 25px;
  --owc-separator-size: 22px;
  --owc-row-width: 360px;
  --owc-row-height: 64px;
  --owc-row-gap: 4px;
  --owc-bubble-offset: 4px;
  --owc-font: "Arial Rounded MT Bold", "Arial Black", "Segoe UI Black", "Yu Gothic UI", "Meiryo", sans-serif;
  --owc-panel-bg: transparent;
  --owc-panel-border: 0;
}
* { box-sizing: border-box; }
html, body { width:100%; min-height:100%; margin:0; }
body.overlay-view {
  overflow:hidden;
  background:transparent;
  font-family:var(--owc-font);
}
.owc-stage {
  width:100vw;
  height:100vh;
  padding:16px 18px;
  background:transparent;
}
.owc-role-list {
  width:var(--owc-row-width);
  display:grid;
  gap:var(--owc-row-gap);
  overflow:visible;
}
.owc-role-row {
  position:relative;
  min-height:var(--owc-row-height);
  display:flex;
  align-items:center;
  gap:18px;
  padding:0;
  background:var(--owc-panel-bg);
  border:var(--owc-panel-border);
  border-radius:0;
  overflow:visible;
  white-space:nowrap;
}
.owc-role-mark,
.owc-num,
.owc-suffix,
.owc-score + .owc-score::before {
  display:inline-block;
  font-family:var(--owc-font);
  font-weight:950;
  line-height:.9;
  -webkit-text-stroke:0;
  text-shadow:
    1px 0 0 var(--owc-outline-color),
    -1px 0 0 var(--owc-outline-color),
    0 1px 0 var(--owc-outline-color),
    0 -1px 0 var(--owc-outline-color),
    1px 1px 0 var(--owc-outline-color),
    -1px 1px 0 var(--owc-outline-color),
    1px -1px 0 var(--owc-outline-color),
    -1px -1px 0 var(--owc-outline-color),
    0 0 2px var(--owc-outline-color),
    0 0 4px var(--owc-outline-color);
  text-rendering:geometricPrecision;
  -webkit-font-smoothing:antialiased;
}
.owc-role-mark {
  width:78px;
  flex:0 0 78px;
  color:var(--owc-role-color);
  font-size:var(--owc-role-size);
  letter-spacing:-1px;
}
.owc-stats-line {
  display:flex;
  align-items:baseline;
  gap:9px;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.owc-score { display:inline-flex; align-items:baseline; gap:2px; }
.owc-score + .owc-score::before {
  content:var(--owc-separator);
  color:var(--owc-separator-color);
  font-size:var(--owc-separator-size);
  margin:0 8px 0 2px;
  line-height:1;
}
.owc-num { font-size:var(--owc-num-size); letter-spacing:-2px; }
.owc-suffix { font-size:var(--owc-suffix-size); margin-left:1px; letter-spacing:-1px; }
.owc-score-win .owc-num, .owc-score-win .owc-suffix { color:var(--owc-win-color); }
.owc-score-loss .owc-num, .owc-score-loss .owc-suffix { color:var(--owc-loss-color); }
.owc-score-draw .owc-num, .owc-score-draw .owc-suffix { color:var(--owc-draw-color); }
.owc-bubble {
  position:absolute;
  left:calc(100% + var(--owc-bubble-offset));
  top:50%;
  transform:translateY(-50%);
  min-width:108px;
  padding:8px 16px;
  border-radius:999px;
  background:var(--owc-bubble-win-bg);
  color:#4b3500;
  font-family:"Yu Gothic UI","Meiryo",sans-serif;
  font-size:17px;
  line-height:1;
  font-weight:950;
  text-align:center;
  white-space:nowrap;
  border:2px solid var(--owc-outline-color);
  -webkit-text-stroke:0;
  text-shadow:none;
  filter:none;
  box-shadow:0 1px 0 rgba(255,255,255,.78) inset, 0 0 5px rgba(255,255,255,.35);
}
.owc-bubble::before {
  content:"";
  position:absolute;
  left:-5px;
  top:50%;
  transform:translateY(-50%) rotate(45deg);
  width:10px;
  height:10px;
  background:inherit;
  border-left:2px solid var(--owc-outline-color);
  border-bottom:2px solid var(--owc-outline-color);
  border-radius:2px;
}
.owc-bubble-loss { background:var(--owc-bubble-loss-bg); color:#fff; }
.owc-bubble-empty { display:none; }
body.app-view {
  margin:0;
  min-height:100vh;
  color:#fff;
  background:linear-gradient(135deg,#21133b,#3b2b66 62%,#2b1749);
  font-family:"Yu Gothic UI","Meiryo",system-ui,sans-serif;
}
.app-wrap { max-width:860px; margin:0 auto; padding:14px; }
.app-head { display:flex; flex-wrap:wrap; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:12px; }
h1 { margin:0 0 5px; font-size:22px; }
p { margin:5px 0; line-height:1.6; }
small, .muted { color:rgba(255,255,255,.74); }
.panel {
  border:1px solid rgba(255,255,255,.22);
  border-radius:20px;
  padding:14px;
  margin:12px 0;
  background:rgba(255,255,255,.075);
  box-shadow:0 14px 40px rgba(0,0,0,.16);
}
.panel h2 { margin:0 0 10px; font-size:18px; }
.grid3 { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:8px; }
.grid2 { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:8px; }
button, select, input, textarea {
  font-family:inherit;
}
button {
  border:0;
  border-radius:13px;
  padding:10px 12px;
  cursor:pointer;
  font-weight:950;
  color:#251943;
  background:var(--owc-role-color);
  transition:transform .12s ease, filter .12s ease, opacity .12s ease;
}
button:hover { transform:translateY(-1px); filter:brightness(1.04); }
button:active { transform:translateY(0); }
button.win { background:var(--owc-win-color); }
button.loss { background:var(--owc-loss-color); color:#2c1121; }
button.draw { background:#b8bec8; }
button.soft { background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.18); }
button.danger { background:linear-gradient(135deg,#f54ca7,#c15cff); color:#fff; }
button.confirm { background:#fff063; }
button:disabled { opacity:.55; cursor:not-allowed; transform:none; }
.role-switch { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
.role-switch button.active { outline:2px solid #fff; box-shadow:0 0 0 4px rgba(255,255,255,.12); }
.direct-row, .candidate-row {
  display:grid;
  grid-template-columns:100px 1fr 1fr 1fr 1fr;
  gap:8px;
  align-items:center;
  padding:8px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  margin:8px 0;
}
.role-title { color:var(--owc-role-color); font-weight:950; }
.candidate-row { grid-template-columns:1.1fr 120px 1fr 1fr; }
.candidate-card {
  display:grid;
  grid-template-columns:1.05fr 128px 92px 92px;
  gap:8px;
  align-items:center;
  padding:10px;
  background:rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.13);
  border-radius:16px;
  margin:8px 0;
}
.candidate-label { font-weight:950; }
.candidate-label.win { color:var(--owc-win-color); }
.candidate-label.loss { color:var(--owc-loss-color); }
.candidate-label.draw { color:#d5dae2; }
select, input, textarea {
  width:100%;
  border:1px solid rgba(255,255,255,.20);
  border-radius:12px;
  padding:10px;
  background:rgba(0,0,0,.20);
  color:#fff;
  font-weight:800;
}
option { color:#111; }
.status {
  margin-top:10px;
  padding:9px 10px;
  border-radius:14px;
  background:rgba(0,0,0,.18);
  color:rgba(255,255,255,.86);
  min-height:38px;
}
.preview-box {
  min-height:230px;
  padding:18px;
  border-radius:18px;
  background:#101119;
  overflow:visible;
}
.preview-box .owc-role-list { transform-origin:top left; }
.designer-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
.field label { display:block; font-weight:900; margin:0 0 5px; color:#fff; }
#cssOutput { min-height:220px; font-family:ui-monospace,Consolas,monospace; font-weight:500; line-height:1.5; }
code { background:rgba(0,0,0,.32); color:#fff063; border-radius:7px; padding:2px 6px; }

/* OBS dock compact control view */

  height:100vh;
  overflow:hidden;
  background:#050509;
}
body.control-view .app-wrap {

  max-width:none;

body.control-view .app-head {

body.control-view p, body.control-view .muted, body.control-view small, body.control-view code { display:none; }
body.control-view .panel {

body.control-view button {

body.control-view .role-switch {

body.control-view .role-switch button { line-height:1.15; }
body.control-view .role-switch small { display:block; font-size:10px; color:rgba(255,255,255,.82); }
body.control-view .grid3 { gap:6px; }
body.control-view .candidate-scroll {

body.control-view .candidate-card {

body.control-view select {

body.control-view .role-title {

body.control-view .auto-toggle { min-width:86px; min-height:32px; padding:6px 10px; font-size:12px; }

<body>
<script>
(function(){
'use strict';
const STORAGE_STATE = 'sachigyan_ow_counter_static_state_v1';
const CHANNEL_NAME = 'sachigyan_ow_counter_static_channel_v1';
const HELPER_BASE = 'http://127.0.0.1:17656';
const roles = [
  {id:'tank', short:'Tank', label:'タンク'},
  {id:'damage', short:'Dps', label:'DPS'},
  {id:'support', short:'Sup', label:'サポート'}
];
const resultLabels = {
  win: {short:'勝ち', candidate:'勝ち候補', cls:'win'},
  loss: {short:'負け', candidate:'負け候補', cls:'loss'},
  draw: {short:'引き分け', candidate:'引き分け候補', cls:'draw'}
};
const channel = ('BroadcastChannel' in window) ? new BroadcastChannel(CHANNEL_NAME) : null;
let state = loadState();
let statusText = '準備OK。自動カウントONで待機中だよ。';

function defaultRoleStats(){ return {wins:0,losses:0,draws:0,streak:0}; }
function defaultState(){
  return {
    activeRole:'support',
    roles:{tank:defaultRoleStats(), damage:defaultRoleStats(), support:defaultRoleStats()},
    history:[],
    candidates:[],
    autoEnabled:true,
    autoLog:[],
    nextCandidateId:1,
    ocrSeen:[],
    updatedAt:Date.now()
  };
}
function mergeState(raw){
  const base = defaultState();
  const parsed = raw && typeof raw === 'object' ? raw : {};
  const merged = {...base, ...parsed};
  merged.roles = {...base.roles, ...(parsed.roles || {})};
  roles.forEach(r => { merged.roles[r.id] = {...defaultRoleStats(), ...(merged.roles[r.id] || {})}; });
  merged.history = Array.isArray(parsed.history) ? parsed.history : [];
  merged.candidates = Array.isArray(parsed.candidates) ? parsed.candidates : [];
  merged.autoEnabled = parsed.autoEnabled !== false;
  merged.autoLog = Array.isArray(parsed.autoLog) ? parsed.autoLog.slice(0, 60) : [];
  merged.nextCandidateId = Number(parsed.nextCandidateId || (merged.candidates.reduce((m,c)=>Math.max(m, Number(c.id)||0),0)+1) || 1);
  merged.ocrSeen = Array.isArray(parsed.ocrSeen) ? parsed.ocrSeen.slice(-500) : [];
  if(!roles.some(r=>r.id===merged.activeRole)) merged.activeRole = 'support';
  return merged;
}
function loadState(){
  try { return mergeState(JSON.parse(localStorage.getItem(STORAGE_STATE) || '{}')); }
  catch(e){ return defaultState(); }
}
function saveState(source='local'){
  state.updatedAt = Date.now();
  localStorage.setItem(STORAGE_STATE, JSON.stringify(state));
  if(channel && source !== 'channel') channel.postMessage({type:'state', state});
  renderAll();
}
function roleLabel(id){ return roles.find(r=>r.id===id)?.label || id; }
function roleShort(id){ return roles.find(r=>r.id===id)?.short || id; }
function setStatus(text){ statusText = text; const el = document.getElementById('status'); if(el) el.textContent = text; }
function safeRole(id){ return roles.some(r=>r.id===id) ? id : state.activeRole || 'support'; }
function safeResult(result){ return ['win','loss','draw'].includes(result) ? result : 'win'; }

function record(roleId, result, meta={}){
  roleId = safeRole(roleId); result = safeResult(result);
  const r = state.roles[roleId];
  const before = {...r};
  state.activeRole = roleId;
  if(result === 'win') { r.wins++; r.streak = r.streak > 0 ? r.streak + 1 : 1; }
  if(result === 'loss') { r.losses++; r.streak = r.streak < 0 ? r.streak - 1 : -1; }
  if(result === 'draw') { r.draws++; r.streak = 0; }
  const entry = {type:'record', roleId, result, before, meta, at:Date.now()};
  state.history.push(entry);
  state.history = state.history.slice(-300);
  return entry;
}
function directRecord(roleId, result){
  record(roleId, result, {source:'direct'});
  setStatus(`${roleLabel(roleId)}に${resultLabels[result].short}を追加したよぉ。`);
  saveState();
}
function resetRole(roleId){
  roleId = safeRole(roleId);
  if(!confirm(`${roleLabel(roleId)}だけリセットする？`)) return;
  const before = {...state.roles[roleId]};
  state.roles[roleId] = defaultRoleStats();
  state.history.push({type:'role-reset', roleId, before, at:Date.now()});
  state.history = state.history.slice(-300);
  setStatus(`${roleLabel(roleId)}だけリセットしたよ。`);
  saveState();
}
function undo(){
  const last = state.history.pop();
  if(!last) { setStatus('戻せる履歴がないよぉ。'); saveState(); return; }
  if(last.type === 'record' && last.before && state.roles[last.roleId]) {
    state.roles[last.roleId] = {...defaultRoleStats(), ...last.before};
    setStatus('直前のカウントを1つ戻したよ。');
    saveState();
    return;
  }
  if(last.type === 'role-reset' && last.before && state.roles[last.roleId]) {
    state.roles[last.roleId] = {...defaultRoleStats(), ...last.before};
    setStatus(`${roleLabel(last.roleId)}のリセットを戻したよ。`);
    saveState();
    return;
  }
  setStatus('戻せる履歴がないよぉ。');
  saveState();
}
function resetAll(){
  if(!confirm('カウントと自動カウント履歴を全部リセットする？')) return;
  const active = state.activeRole;
  const autoEnabled = state.autoEnabled !== false;
  state = defaultState();
  state.activeRole = active;
  state.autoEnabled = autoEnabled;
  setStatus('全部リセットしたよ。');
  saveState();
}

function addCandidate(result, roleId=state.activeRole, source='manual-test', externalId=null){
  result = safeResult(result); roleId = safeRole(roleId);
  if(externalId && state.ocrSeen.includes(String(externalId))) return;
  const candidate = {id:state.nextCandidateId++, externalId:externalId ? String(externalId) : null, roleId, result, source, createdAt:Date.now()};
  state.candidates.push(candidate);
  if(externalId) state.ocrSeen = [...state.ocrSeen, String(externalId)].slice(-500);
  state.activeRole = roleId;
  setStatus(`${roleLabel(roleId)}の${resultLabels[result].candidate}を候補リストに追加したよ。`);
  saveState();
}
function confirmCandidate(id){
  id = Number(id);
  const idx = state.candidates.findIndex(c => Number(c.id) === id);
  if(idx < 0) { setStatus('その候補が見つからなかったよ。'); return; }
  const c = state.candidates[idx];
  record(c.roleId, c.result, {source:'candidate', candidateId:c.id, candidateSource:c.source});
  state.candidates.splice(idx, 1);
  setStatus(`${roleLabel(c.roleId)}の${resultLabels[c.result].candidate}を確定したよ。`);
  saveState();
}
function discardCandidate(id){
  id = Number(id);
  const idx = state.candidates.findIndex(c => Number(c.id) === id);
  if(idx < 0) { setStatus('その候補が見つからなかったよ。'); return; }
  const c = state.candidates[idx];
  state.candidates.splice(idx, 1);
  setStatus(`${roleLabel(c.roleId)}の${resultLabels[c.result].candidate}を破棄したよ。`);
  saveState();
}
function changeCandidateRole(id, roleId){
  id = Number(id); roleId = safeRole(roleId);
  const c = state.candidates.find(c => Number(c.id) === id);
  if(!c) return;
  c.roleId = roleId;
  state.activeRole = roleId;
  setStatus(`候補のロールを${roleLabel(roleId)}に変更したよ。`);
  saveState();
}
function clearCandidates(){
  if(!state.candidates.length) { setStatus('未確定候補はないよ。'); return; }
  if(!confirm('未確定候補をすべて破棄する？')) return;
  state.candidates = [];
  setStatus('未確定候補をすべて破棄したよ。');
  saveState();
}
function toggleAutoEnabled(){
  state.autoEnabled = state.autoEnabled === false;
  setStatus(state.autoEnabled ? '自動カウントをONにしたよ。' : '自動カウントをOFFにしたよ。');
  saveState();
}
function autoRecordFromExternal(c){
  const externalId = String(c.id || c.externalId || `${c.result}-${c.createdAt || Date.now()}`);
  if(state.ocrSeen.includes(externalId)) return;
  state.ocrSeen = [...state.ocrSeen, externalId].slice(-500);
  if(state.autoEnabled === false) {
    setStatus('自動OFF中なので検出結果は加算しなかったよ。');
    saveState();
    return;
  }
  const result = safeResult(c.result);
  const roleId = safeRole(c.roleId || state.activeRole);
  record(roleId, result, {source:'auto', externalId, candidateSource:c.source || 'helper', text:c.text || ''});
  const info = resultLabels[result] || resultLabels.win;
  state.autoLog = [{
    id:`auto-${Date.now()}-${Math.random().toString(16).slice(2)}`,
    roleId,
    result,
    source:c.source || 'helper',
    externalId,
    text:c.text || '',
    createdAt:Date.now()
  }, ...(state.autoLog || [])].slice(0, 40);
  setStatus(`${roleShort(roleId)}に${info.short}を自動カウントしたよ。`);
  saveState();
}
function setActiveRole(roleId){
  state.activeRole = safeRole(roleId);
  setStatus(`現在ロールを${roleLabel(state.activeRole)}にしたよ。`);
  saveState();
}

function bubble(streak){
  streak = Number(streak || 0);
  if(streak >= 2) return {cls:'owc-bubble-win', text:`${streak}連勝✨`};
  if(streak <= -2) return {cls:'owc-bubble-loss', text:`${Math.abs(streak)}連敗😢`};
  return {cls:'owc-bubble-empty', text:''};
}
function counterHTML(){
  return roles.map(r => {
    const d = state.roles[r.id] || defaultRoleStats();
    const b = bubble(d.streak);
    return `<div class="owc-role-row" data-role="${r.id}">
      <div class="owc-role-mark">${r.short}</div>
      <div class="owc-stats-line">
        <span class="owc-score owc-score-win"><span class="owc-num">${Number(d.wins)||0}</span><span class="owc-suffix">W</span></span>
        <span class="owc-score owc-score-loss"><span class="owc-num">${Number(d.losses)||0}</span><span class="owc-suffix">L</span></span>
        <span class="owc-score owc-score-draw"><span class="owc-num">${Number(d.draws)||0}</span><span class="owc-suffix">D</span></span>
      </div>
      <div class="owc-bubble ${b.cls}">${b.text}</div>
    </div>`;
  }).join('');
}
function getView(){
  const qs = new URLSearchParams(location.search);
  if(location.hash === '#control') return 'control';
  if(location.hash === '#designer') return 'designer';
  return qs.get('view') || 'overlay';
}
function openView(view){
  const base = `${location.pathname}?view=${view}`;
  location.href = base;
}
async function loadOverlayCustomCss(){
  try {
    const res = await fetch(`${HELPER_BASE}/overlay-css`, {cache:'no-store'});
    if(!res.ok) return;
    const css = await res.text();
    let tag = document.getElementById('owcLocalOverlayCss');
    if(!tag){ tag = document.createElement('style'); tag.id = 'owcLocalOverlayCss'; document.head.appendChild(tag); }
    tag.textContent = css;
  } catch(e) {}
}
function renderOverlay(){
  document.body.className = 'overlay-view';
  document.body.innerHTML = `<div class="owc-stage"><div class="owc-role-list" id="counter">${counterHTML()}</div></div>`;
  loadOverlayCustomCss();
}
function roleButtonsHTML(){
  return roles.map(r => `<button class="soft ${state.activeRole===r.id?'active':''}" onclick="OWC.setActiveRole('${r.id}')">${r.short}<br><small>${r.label}</small></button>`).join('');
}
function directRowsHTML(){
  return roles.map(r => `<div class="direct-row">
    <div class="role-title">${r.short}<br><small>${r.label}</small></div>
    <button class="win" onclick="OWC.directRecord('${r.id}','win')">+ 勝ち</button>
    <button class="loss" onclick="OWC.directRecord('${r.id}','loss')">+ 負け</button>
    <button class="draw" onclick="OWC.directRecord('${r.id}','draw')">+ 引き分け</button>
    <button class="role-reset" onclick="OWC.resetRole('${r.id}')">リセット</button>
  </div>`).join('');
}
function autoLogCardsHTML(){
  const log = Array.isArray(state.autoLog) ? state.autoLog : [];
  if(!log.length) return `<p class="candidate-empty">まだ自動カウント履歴はないよ。</p>`;
  return log.slice(0, 20).map((item, idx) => {
    const info = resultLabels[item.result] || resultLabels.win;
    const time = new Date(item.createdAt || Date.now()).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    return `<div class="auto-log-card">
      <div><b class="${info.cls}">${roleShort(item.roleId)} / ${info.short}</b><small>${time} / 自動加算${idx===0?' / 最新':''}</small></div>
    </div>`;
  }).join('');
}
function renderControl(){
  const autoOn = state.autoEnabled !== false;
  document.body.className = 'app-view control-view';
  document.body.innerHTML = `<div class="app-wrap">
    <div class="app-head">
      <h1>KAWAII OW COUNTER</h1>
    </div>
    <section class="panel auto-panel">
      <h2><span>🤖 自動カウント</span><button class="auto-toggle ${autoOn ? 'danger' : 'soft'}" onclick="OWC.toggleAutoEnabled()">${autoOn ? '自動OFF' : '自動ON'}</button></h2>
      <div class="helper-mini-status" id="helperMiniStatus">helper: checking... / auto: ${autoOn ? 'ON' : 'OFF'}</div>
      <div class="auto-history-title">自動カウント履歴</div>
      <div class="candidate-scroll" id="autoLogList">${autoLogCardsHTML()}</div>
    </section>
    <section class="panel manual-panel">
      <h2>🕹️ 手動カウント</h2>
      ${directRowsHTML()}
    </section>
    <section class="panel">
      <div class="dock-actions">
        <button class="soft" onclick="OWC.undo()">1つ戻す</button>
        <button class="soft" onclick="OWC.openSettings()">設定</button>
        <button class="danger" onclick="OWC.resetAll()">すべてリセット</button>
      </div>
      <div class="status" id="status">${statusText}</div>
    </section>
  </div>`;
}
function renderDesigner(){
  document.body.className = 'app-view';
  const defaults = defaultCssVars();
  document.body.innerHTML = `<div class="app-wrap">
    <div class="app-head">
      <div>
        <h1>🎨 デザインCSSメモ</h1>
        <p>OBSのカスタムCSSに貼る用。今回からHTML本体側ではCSS変数をJavaScriptで上書きしないから、ここで出したCSSが効きやすいよ。</p>
      </div>
      <button class="soft" onclick="OWC.openView('control')">操作へ戻る</button>
    </div>
    <section class="panel"><h2>👀 プレビュー</h2><div class="preview-box"><div class="owc-role-list">${counterHTML()}</div></div></section>
    <section class="panel"><h2>⚙️ CSS生成</h2><div class="designer-grid" id="designerForm"></div><div class="grid3" style="margin-top:10px"><button onclick="OWC.updatePreviewCss()">プレビュー反映</button><button class="soft" onclick="OWC.copyCss()">CSSコピー</button><button class="soft" onclick="OWC.fillDefaultCss()">初期値</button></div><textarea id="cssOutput"></textarea><div class="status" id="status">CSSをコピーしてOBSのカスタムCSSへ貼れるよ。</div></section>
  </div>`;
  const fields = [
    ['--owc-role-color','Tank/Dps/Sup色','color'], ['--owc-win-color','W色','color'], ['--owc-loss-color','L色','color'], ['--owc-draw-color','D色','color'],
    ['--owc-separator','区切り 例: "💛" "♡" " / "','text'], ['--owc-separator-color','区切り色','color'], ['--owc-row-width','吹き出し位置用の幅','text'], ['--owc-bubble-offset','吹き出しの距離','text'],
    ['--owc-num-size','数字サイズ','text'], ['--owc-role-size','ロール名サイズ','text'], ['--owc-suffix-size','W/L/Dサイズ','text']
  ];
  document.getElementById('designerForm').innerHTML = fields.map(([key,label,type]) => `<div class="field"><label>${label}</label><input data-css-var="${key}" type="${type}" value="${defaults[key] || ''}"></div>`).join('');
  refreshCssOutput();
}
function defaultCssVars(){
  return {
    '--owc-role-color':'#b967ff', '--owc-win-color':'#3ad2ee', '--owc-loss-color':'#f54ca7', '--owc-draw-color':'#a7adb7', '--owc-separator':'"💛"', '--owc-separator-color':'#ffd84d', '--owc-row-width':'360px', '--owc-bubble-offset':'4px', '--owc-num-size':'58px', '--owc-role-size':'30px', '--owc-suffix-size':'25px'
  };
}
function cssFromForm(){
  const values = {};
  document.querySelectorAll('[data-css-var]').forEach(input => { values[input.dataset.cssVar] = input.value.trim(); });
  return `:root {\n${Object.entries(values).map(([k,v]) => `  ${k}: ${v};`).join('\n')}\n}\n`;
}
function refreshCssOutput(){ const t = document.getElementById('cssOutput'); if(t) t.value = cssFromForm(); }
function updatePreviewCss(){
  refreshCssOutput();
  let tag = document.getElementById('designerPreviewCss');
  if(!tag){ tag = document.createElement('style'); tag.id='designerPreviewCss'; document.head.appendChild(tag); }
  tag.textContent = cssFromForm();
  setStatus('プレビューに反映したよ。OBSへはCSSコピーして貼ってね。');
}
function fillDefaultCss(){ renderDesigner(); }
async function copyCss(){
  refreshCssOutput();
  const text = document.getElementById('cssOutput')?.value || '';
  try { await navigator.clipboard.writeText(text); setStatus('CSSをコピーしたよ。'); }
  catch(e){ setStatus('自動コピーできなかったかも。テキスト欄から手動コピーしてね。'); }
}
async function copyState(){
  try { await navigator.clipboard.writeText(JSON.stringify(state, null, 2)); setStatus('JSONをコピーしたよ。'); }
  catch(e){ setStatus('JSONコピーに失敗したかも。'); }
}
function openSettings(){
  try {
    const w = window.open(HELPER_BASE, '_blank');
    if(!w) location.href = HELPER_BASE;
  } catch(e) {
    location.href = HELPER_BASE;
  }
}
function renderAll(){ const v=getView(); if(v==='control') renderControl(); else if(v==='designer') renderDesigner(); else renderOverlay(); }

window.OWC = { addCandidate, confirmCandidate, discardCandidate, changeCandidateRole, clearCandidates, directRecord, resetRole, undo, resetAll, setActiveRole, toggleAutoEnabled, autoRecordFromExternal, openView, renderControl, copyState, renderDesigner, updatePreviewCss, copyCss, fillDefaultCss, openSettings };
window.addOwCandidate = function(result, roleId, source, externalId){ autoRecordFromExternal({result, roleId: roleId || state.activeRole, source: source || 'external', id: externalId || `external-${Date.now()}`}); };
window.addEventListener('message', ev => {
  const d = ev.data || {};
  if(d.type === 'owc-candidate') autoRecordFromExternal({result:d.result, roleId:d.roleId || state.activeRole, source:d.source || 'postMessage', id:d.externalId || `post-${Date.now()}`});
});

let ocrOfflineNotified = false;
async function pollOcrHelper(){
  if(getView() !== 'control') return;
  try {
    const res = await fetch(`${HELPER_BASE}/candidates`, {cache:'no-store'});
    if(!res.ok) return;
    const data = await res.json();
    const list = Array.isArray(data.candidates) ? data.candidates : [];
    list.forEach(c => autoRecordFromExternal(c));
    const mini = document.getElementById('helperMiniStatus');
    if(mini) mini.textContent = `helper: ${data.status || 'ok'} / scans ${data.scan_count || 0} / auto: ${state.autoEnabled !== false ? 'ON' : 'OFF'}${data.error ? ' / error: ' + data.error : ''}`;
    if(list.length && ocrOfflineNotified) ocrOfflineNotified = false;
  } catch(e) {
    ocrOfflineNotified = true;
    const mini = document.getElementById('helperMiniStatus');
    if(mini) mini.textContent = 'helper: offline';
  }
}
setInterval(pollOcrHelper, 1500);

if(channel){
  channel.onmessage = ev => {
    if(ev.data && ev.data.type === 'state') { state = mergeState(ev.data.state); localStorage.setItem(STORAGE_STATE, JSON.stringify(state)); renderAll(); }
  };
}
window.addEventListener('storage', ev => {
  if(ev.key === STORAGE_STATE && ev.newValue) { try { state = mergeState(JSON.parse(ev.newValue)); renderAll(); } catch(e){} }
});
window.addEventListener('keydown', ev => {
  if(getView() !== 'control') return;
  const key = ev.key.toLowerCase();
  if(key === '1') setActiveRole('tank');
  if(key === '2') setActiveRole('damage');
  if(key === '3') setActiveRole('support');
  if(key === 'w') directRecord(state.activeRole, 'win');
  if(key === 'l') directRecord(state.activeRole, 'loss');
  if(key === 'd') directRecord(state.activeRole, 'draw');
  if(key === 'u') undo();
});
renderAll();
})();
</script>
</body>
</html>
