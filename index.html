<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OW勝敗カウンター GitHub Pages Prototype Labels Separator</title>
<style>
:root {
  --owc-role-color: #ffe845;
  --owc-win-color: #3ad2ee;
  --owc-loss-color: #f54ca7;
  --owc-draw-color: #9aa0aa;
  --owc-outline-color: #ffffff;
  --owc-bubble-win-bg: #ffe845;
  --owc-bubble-loss-bg: #f54ca7;
  --owc-font: "Arial Black", "Segoe UI Black", "Yu Gothic UI", "Meiryo", sans-serif;
  --owc-role-size: 30px;
  --owc-num-size: 46px;
  --owc-suffix-size: 26px;
  --owc-separator: "☆";
  --owc-separator-color: #ffffff;
  --owc-separator-size: 22px;
  --owc-role-outline: 5px;
  --owc-num-outline: 5px;
  --owc-suffix-outline: 3.2px;
  --owc-row-gap: 7px;
  --owc-row-height: 58px;
  --owc-row-width: 430px;
  --owc-bubble-offset: 8px;
  --owc-panel-bg: transparent;
  --owc-panel-border: 0;
}
* { box-sizing: border-box; }
html, body { margin:0; min-height:100%; }
body.overlay-view {
  width:100vw;
  height:100vh;
  background: transparent;
  overflow:hidden;
  font-family: var(--owc-font);
}
.owc-stage { width:100vw; height:100vh; padding:22px; background:transparent; }
.owc-role-list { width:var(--owc-row-width); display:grid; gap:var(--owc-row-gap); overflow:visible; }
.owc-role-row {
  min-height:var(--owc-row-height);
  display:grid;
  grid-template-columns:86px 1fr;
  align-items:center;
  gap:12px;
  padding:7px 12px 7px 7px;
  position:relative;
  overflow:visible;
  border:var(--owc-panel-border);
  background:var(--owc-panel-bg);
}
.owc-role-mark, .owc-num, .owc-suffix {
  font-family: var(--owc-font);
  font-weight:900;
  paint-order: stroke fill;
}
.owc-role-mark {
  width:86px;
  height:42px;
  display:grid;
  place-items:center;
  color:var(--owc-role-color);
  font-size:var(--owc-role-size);
  line-height:.86;
  letter-spacing:-.04em;
  -webkit-text-stroke: var(--owc-role-outline) var(--owc-outline-color);
  text-shadow:-3px -3px 0 var(--owc-outline-color), 0 -3px 0 var(--owc-outline-color), 3px -3px 0 var(--owc-outline-color), -3px 0 0 var(--owc-outline-color), 3px 0 0 var(--owc-outline-color), -3px 3px 0 var(--owc-outline-color), 0 3px 0 var(--owc-outline-color), 3px 3px 0 var(--owc-outline-color), 0 0 8px rgba(255,255,255,.42);
}
.owc-stats-line { display:flex; align-items:baseline; gap:8px; white-space:nowrap; font-variant-numeric:tabular-nums; }
.owc-score { display:inline-flex; align-items:baseline; gap:2px; }
.owc-score + .owc-score::before {
  content: var(--owc-separator);
  color: var(--owc-separator-color);
  font-family: var(--owc-font);
  font-size: var(--owc-separator-size);
  font-weight: 900;
  -webkit-text-stroke: 2px var(--owc-outline-color);
  paint-order: stroke fill;
  text-shadow: -1px -1px 0 var(--owc-outline-color), 1px -1px 0 var(--owc-outline-color), -1px 1px 0 var(--owc-outline-color), 1px 1px 0 var(--owc-outline-color);
  margin: 0 8px 0 2px;
}
.owc-num {
  display:inline-block;
  font-size:var(--owc-num-size);
  line-height:.80;
  -webkit-text-stroke: var(--owc-num-outline) var(--owc-outline-color);
  text-shadow:-4px -4px 0 var(--owc-outline-color), 0 -4px 0 var(--owc-outline-color), 4px -4px 0 var(--owc-outline-color), -4px 0 0 var(--owc-outline-color), 4px 0 0 var(--owc-outline-color), -4px 4px 0 var(--owc-outline-color), 0 4px 0 var(--owc-outline-color), 4px 4px 0 var(--owc-outline-color), 0 0 9px rgba(255,255,255,.38);
}
.owc-suffix {
  display:inline-block;
  font-size:var(--owc-suffix-size);
  line-height:1;
  -webkit-text-stroke: var(--owc-suffix-outline) var(--owc-outline-color);
  text-shadow:-2px -2px 0 var(--owc-outline-color), 0 -2px 0 var(--owc-outline-color), 2px -2px 0 var(--owc-outline-color), -2px 0 0 var(--owc-outline-color), 2px 0 0 var(--owc-outline-color), -2px 2px 0 var(--owc-outline-color), 0 2px 0 var(--owc-outline-color), 2px 2px 0 var(--owc-outline-color);
  margin-left:1px;
}
.owc-score-win .owc-num, .owc-score-win .owc-suffix { color:var(--owc-win-color); }
.owc-score-loss .owc-num, .owc-score-loss .owc-suffix { color:var(--owc-loss-color); }
.owc-score-draw .owc-num, .owc-score-draw .owc-suffix { color:var(--owc-draw-color); }
.owc-bubble {
  position:absolute;
  left:calc(100% + var(--owc-bubble-offset));
  top:50%;
  transform:translateY(-50%);
  min-width:88px;
  padding:7px 10px;
  border-radius:999px;
  background:var(--owc-bubble-win-bg);
  color:#4b3500;
  font-size:13px;
  line-height:1.05;
  font-weight:950;
  text-align:center;
  white-space:nowrap;
  border:3px solid var(--owc-outline-color);
  text-shadow:0 1px 0 rgba(255,255,255,.75);
}
.owc-bubble::before {
  content:"";
  position:absolute;
  left:-5px;
  top:50%;
  transform:translateY(-50%) rotate(45deg);
  width:10px;
  height:10px;
  background:inherit;
  border-left:1px solid rgba(0,0,0,.12);
  border-bottom:1px solid rgba(0,0,0,.12);
  border-radius:2px;
}
.owc-bubble-loss { background:var(--owc-bubble-loss-bg); color:#fff; }
.owc-bubble-empty { display:none; }
body.app-view { margin:0; color:#fff; background:linear-gradient(135deg,#251544,#3c2d64); font-family:"Yu Gothic UI","Meiryo",sans-serif; }
.app-wrap { max-width:760px; margin:0 auto; padding:14px; }
.app-head { display:flex; flex-wrap:wrap; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:12px; }
h1 { margin:0; font-size:22px; }
p { margin:5px 0 0; color:#eadfff; font-size:13px; line-height:1.55; }
code { background:rgba(0,0,0,.25); color:var(--owc-role-color); border-radius:6px; padding:2px 5px; }
.panel { border:1px solid rgba(255,255,255,.16); border-radius:18px; background:rgba(255,255,255,.08); padding:12px; margin-bottom:12px; }
h2 { margin:0 0 10px; font-size:16px; }
.role-control { display:grid; grid-template-columns:58px repeat(3,1fr); gap:6px; align-items:center; padding:8px; border:1px solid rgba(255,255,255,.14); border-radius:15px; background:rgba(0,0,0,.18); margin-bottom:8px; }
.role-title { color:var(--owc-role-color); font-weight:950; }
button { border:0; border-radius:12px; padding:9px 7px; cursor:pointer; font-weight:900; color:#24143b; background:var(--owc-role-color); }
button.loss { background:var(--owc-loss-color); color:#281322; }
button.draw { background:#bfefff; color:#143541; }
button.soft { background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.18); }
button.danger { color:#fff; background:linear-gradient(145deg,#f54ca7,#a55cff); }
.grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px; }
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.status { margin-top:10px; min-height:36px; padding:9px 10px; border-radius:13px; background:rgba(0,0,0,.18); color:#eadfff; font-size:13px; line-height:1.4; }
textarea { width:100%; min-height:150px; margin-top:8px; border-radius:14px; border:1px solid rgba(255,255,255,.16); background:rgba(0,0,0,.28); color:#fff; padding:10px; resize:vertical; font-family:Consolas, monospace; }
.designer-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; }
.field { display:grid; gap:5px; }
.field label { font-size:12px; color:#eadfff; }
.field input, .field select { width:100%; padding:9px; border-radius:10px; border:1px solid rgba(255,255,255,.18); background:rgba(0,0,0,.24); color:#fff; }
.preview-box { background:linear-gradient(45deg, rgba(255,255,255,.14) 25%, transparent 25%, transparent 75%, rgba(255,255,255,.14) 75%), linear-gradient(45deg, rgba(255,255,255,.14) 25%, transparent 25%, transparent 75%, rgba(255,255,255,.14) 75%); background-position:0 0, 10px 10px; background-size:20px 20px; border-radius:14px; padding:16px; overflow:visible; }
@media(max-width:600px){ .role-control{grid-template-columns:52px repeat(3,1fr);} .grid4{grid-template-columns:repeat(2,1fr);} .designer-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<script>
const STORAGE_STATE = 'sachigyan_ow_counter_static_state_v1';
const STORAGE_DESIGN = 'sachigyan_ow_counter_static_design_v1';
const CHANNEL = 'sachigyan_ow_counter_static_channel_v1';
const roles = [
  {id:'tank', label:'タンク', short:'Tank'},
  {id:'damage', label:'DPS', short:'Dps'},
  {id:'support', label:'サポート', short:'Sup'}
];
let channel = null;
try { channel = new BroadcastChannel(CHANNEL); } catch(e) {}
function defaultState(){ return {activeRole:'support', roles:{tank:{wins:0,losses:0,draws:0,streak:0}, damage:{wins:0,losses:0,draws:0,streak:0}, support:{wins:0,losses:0,draws:0,streak:0}}, history:[], pending:{roleId:'support', result:null}, updatedAt:Date.now()}; }
function loadState(){ try { return {...defaultState(), ...JSON.parse(localStorage.getItem(STORAGE_STATE)||'{}')}; } catch(e){ return defaultState(); } }
let state = loadState();
function saveState(){ state.updatedAt = Date.now(); localStorage.setItem(STORAGE_STATE, JSON.stringify(state)); if(channel) channel.postMessage({type:'state', state}); renderAll(); }
function record(roleId, result){ const r = state.roles[roleId]; if(!r) return; const before = {...r}; state.activeRole = roleId; if(result==='win'){ r.wins++; r.streak = r.streak > 0 ? r.streak + 1 : 1; } if(result==='loss'){ r.losses++; r.streak = r.streak < 0 ? r.streak - 1 : -1; } if(result==='draw'){ r.draws++; r.streak = 0; } state.history.push({roleId,result,before}); state.history = state.history.slice(-200); saveState(); setStatus(`${labelFor(roleId)}に${resultLabel(result)}を追加したよぉ。`); }
function undo(){ const last = state.history.pop(); if(!last) return setStatus('戻せる履歴がないよぉ。'); state.roles[last.roleId] = last.before; state.activeRole = last.roleId; saveState(); setStatus('1つ戻したよぉ。'); }
function resetAll(){ if(!confirm('全リセットします。よろしいですか？')) return; state = defaultState(); saveState(); setStatus('全リセットしたよぉ。'); }
function labelFor(id){ return roles.find(r=>r.id===id)?.label || id; }
function resultLabel(v){ return v==='win'?'勝ち':v==='loss'?'負け':v==='draw'?'引き分け':'なし'; }
function bubble(streak){ if(streak>=2) return {cls:'owc-bubble-win', text:`${streak}連勝✨`}; if(streak<=-2) return {cls:'owc-bubble-loss', text:`${Math.abs(streak)}連敗😢`}; return {cls:'owc-bubble-empty', text:''}; }
function counterHTML(){ return roles.map(r=>{ const d = state.roles[r.id] || {wins:0,losses:0,draws:0,streak:0}; const b = bubble(Number(d.streak || 0)); return `<div class="owc-role-row"><div class="owc-role-mark">${r.short}</div><div class="owc-stats-line"><span class="owc-score owc-score-win"><span class="owc-num">${d.wins}</span><span class="owc-suffix">W</span></span><span class="owc-score owc-score-loss"><span class="owc-num">${d.losses}</span><span class="owc-suffix">L</span></span><span class="owc-score owc-score-draw"><span class="owc-num">${d.draws}</span><span class="owc-suffix">D</span></span></div><div class="owc-bubble ${b.cls}">${b.text}</div></div>`; }).join(''); }
function renderOverlay(){ document.body.className='overlay-view'; document.body.innerHTML = `<div class="owc-stage"><div class="owc-role-list" id="counter">${counterHTML()}</div></div>`; }
function renderControl(){ document.body.className='app-view'; document.body.innerHTML = `<div class="app-wrap"><div class="app-head"><div><h1>🎮 OW勝敗カウンター操作</h1><p>GitHub Pagesに置いたら、表示は <code>?view=overlay</code>、操作は <code>?view=control</code> をOBSに入れてね。</p></div><button class="soft" onclick="openView('designer')">デザイン調整</button></div><section class="panel"><h2>📍 手動操作</h2><div id="controls"></div><div class="grid4"><button class="soft" onclick="undo()">1つ戻す</button><button class="soft" onclick="showJson()">JSON表示</button><button class="soft" onclick="copyJson()">JSONコピー</button><button class="danger" onclick="resetAll()">全リセット</button></div><textarea id="dataBox" placeholder="JSONバックアップ表示用"></textarea><div class="status" id="status">待機中だよぉ。</div></section><section class="panel"><h2>🤖 半自動候補＋確認ボタン</h2><div class="grid3">${roles.map(r=>`<button class="soft" onclick="setActive('${r.id}')">${r.short} ${r.label}</button>`).join('')}</div><div class="grid3" style="margin-top:8px"><button onclick="setCandidate('win')">勝ち候補</button><button class="loss" onclick="setCandidate('loss')">負け候補</button><button class="draw" onclick="setCandidate('draw')">引き分け候補</button></div><div class="status" id="candidateText">候補なし</div><div class="grid3" style="margin-top:8px"><button onclick="confirmCandidate()">確定</button><button class="soft" onclick="rejectCandidate()">破棄</button><button class="soft" onclick="openView('overlay')">表示を見る</button></div></section></div>`; document.getElementById('controls').innerHTML = roles.map(r=>`<div class="role-control"><div class="role-title">${r.short} ${r.label}</div><button onclick="record('${r.id}','win')">+勝ち</button><button class="loss" onclick="record('${r.id}','loss')">+負け</button><button class="draw" onclick="record('${r.id}','draw')">+引き分け</button></div>`).join(''); renderCandidate(); }
function renderDesigner(){ document.body.className='app-view'; const d = getCurrentVars(); document.body.innerHTML = `<div class="app-wrap"><div class="app-head"><div><h1>🎨 デザインCSSジェネレーター</h1><p>色・サイズ・W/L/Dの区切り記号を変えて、CSSをコピー。OBSのブラウザソース「カスタムCSS」に貼れるよ。</p></div><button class="soft" onclick="openView('control')">操作へ戻る</button></div><section class="panel"><h2>👀 プレビュー</h2><div class="preview-box"><div class="owc-role-list">${counterHTML()}</div></div></section><section class="panel"><h2>⚙️ デザイン設定</h2><div class="designer-grid" id="designerForm"></div><div class="grid3" style="margin-top:10px"><button onclick="updateDesignFromForm()">プレビュー反映</button><button class="soft" onclick="copyCss()">CSSコピー</button><button class="soft" onclick="resetDesign()">初期値</button></div><textarea id="cssOutput"></textarea><div class="status" id="status">CSSはOBSのカスタムCSSにも貼れるよぉ。</div></section></div>`; const fields = [['--owc-role-color','Tank/Dps/Sup色','color'],['--owc-win-color','W色','color'],['--owc-loss-color','L色','color'],['--owc-draw-color','DRAW色','color'],['--owc-outline-color','白フチ色','color'],['--owc-bubble-win-bg','連勝吹き出し','color'],['--owc-bubble-loss-bg','連敗吹き出し','color'],['--owc-num-size','数字サイズ','text'],['--owc-role-size','Tank/Dps/Supサイズ','text'],['--owc-suffix-size','W/L/Dサイズ','text'],['--owc-separator','区切り 例: "/" "♡" "☆"','text'],['--owc-separator-color','区切り色','color'],['--owc-separator-size','区切りサイズ','text'],['--owc-num-outline','数字フチ幅','text'],['--owc-row-gap','行間','text']]; document.getElementById('designerForm').innerHTML = fields.map(([key,label,type])=>`<div class="field"><label>${label}</label><input data-css-var="${key}" type="${type}" value="${d[key] || ''}"></div>`).join(''); refreshCssOutput(); }
function getCurrentVars(){ const saved = JSON.parse(localStorage.getItem(STORAGE_DESIGN)||'{}'); const defaults = {'--owc-role-color':'#ffe845','--owc-win-color':'#3ad2ee','--owc-loss-color':'#f54ca7','--owc-draw-color':'#9aa0aa','--owc-outline-color':'#ffffff','--owc-bubble-win-bg':'#ffe845','--owc-bubble-loss-bg':'#f54ca7','--owc-num-size':'46px','--owc-role-size':'30px','--owc-suffix-size':'26px','--owc-separator':'"☆"','--owc-separator-color':'#ffffff','--owc-separator-size':'22px','--owc-num-outline':'5px','--owc-row-gap':'7px'}; return {...defaults, ...saved}; }
function applySavedDesign(){ const d = getCurrentVars(); Object.entries(d).forEach(([k,v])=>document.documentElement.style.setProperty(k,v)); }
function updateDesignFromForm(){ const d = {}; document.querySelectorAll('[data-css-var]').forEach(i=>d[i.dataset.cssVar]=i.value.trim()); localStorage.setItem(STORAGE_DESIGN, JSON.stringify(d)); applySavedDesign(); renderDesigner(); }
function resetDesign(){ localStorage.removeItem(STORAGE_DESIGN); applySavedDesign(); renderDesigner(); }
function cssText(){ const d = getCurrentVars(); return `:root {\n${Object.entries(d).map(([k,v])=>`  ${k}: ${v};`).join('\n')}\n}\n\n/* 枠・背景を変えたいときだけ編集 */\n.owc-role-row {\n  background: transparent;\n  border: 0;\n}\n`; }
function refreshCssOutput(){ const el = document.getElementById('cssOutput'); if(el) el.value = cssText(); }
async function copyCss(){ refreshCssOutput(); try{ await navigator.clipboard.writeText(document.getElementById('cssOutput').value); setStatus('CSSをコピーしたよぉ。'); }catch(e){ setStatus('自動コピーできなかったから手動コピーしてね。'); } }
function setStatus(t){ const el=document.getElementById('status'); if(el) el.textContent=t; }
function renderCandidate(){ const el=document.getElementById('candidateText'); if(!el) return; const p = state.pending || {}; if(!p.result) return el.textContent='候補なし'; el.innerHTML = `候補：<b>${labelFor(p.roleId)} / ${resultLabel(p.result)}</b>`; }
function setActive(roleId){ state.activeRole=roleId; state.pending.roleId=roleId; saveState(); }
function setCandidate(result){ state.pending={roleId:state.activeRole,result}; saveState(); }
function confirmCandidate(){ if(!state.pending?.result) return setStatus('候補がないよぉ。'); const {roleId,result}=state.pending; record(roleId,result); state.pending={roleId,result:null}; saveState(); }
function rejectCandidate(){ state.pending={roleId:state.activeRole,result:null}; saveState(); }
function showJson(){ const el=document.getElementById('dataBox'); if(el) el.value=JSON.stringify(state,null,2); }
async function copyJson(){ showJson(); try{ await navigator.clipboard.writeText(document.getElementById('dataBox').value); setStatus('JSONコピーしたよぉ。'); }catch(e){ setStatus('手動コピーしてね。'); } }
function renderAll(){ const view = getView(); applySavedDesign(); if(view==='control') return renderControl(); if(view==='designer') return renderDesigner(); renderOverlay(); }
function getView(){ const q = new URLSearchParams(location.search); return q.get('view') || (location.hash.includes('control') ? 'control' : location.hash.includes('designer') ? 'designer' : 'overlay'); }
function openView(view){ const url = new URL(location.href); url.searchParams.set('view',view); location.href = url.toString(); }
if(channel){ channel.onmessage = ev => { if(ev.data?.type==='state'){ state = ev.data.state; localStorage.setItem(STORAGE_STATE, JSON.stringify(state)); if(getView()==='overlay') renderOverlay(); } }; }
window.addEventListener('storage', ev => { if(ev.key===STORAGE_STATE && ev.newValue){ state=JSON.parse(ev.newValue); if(getView()==='overlay') renderOverlay(); } if(ev.key===STORAGE_DESIGN) applySavedDesign(); });
setInterval(()=>{ const latest = loadState(); if(latest.updatedAt !== state.updatedAt){ state=latest; if(getView()==='overlay') renderOverlay(); } }, 500);
applySavedDesign(); renderAll();
</script>
</body>
</html>
